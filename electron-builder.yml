appId: com.affinityit.tenantdeck
productName: TenantDeck
artifactName: ${productName}-Setup-${version}.${ext}
directories:
  output: release
  buildResources: build
files:
  - dist/**
  - package.json
asarUnpack:
  - "**/node_modules/better-sqlite3/**"
publish:
  provider: github
win:
  target:
    - target: nsis
      arch: [x64]
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
linux:
  target:
    - target: deb
      arch: [x64]
  artifactName: tenantdeck_${version}_amd64.${ext}
  category: Utility
  maintainer: Affinity IT Engineering
deb:
  depends:
    - libsecret-1-0
